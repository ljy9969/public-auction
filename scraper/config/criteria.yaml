# User search criteria → Onbid form + post-filters

onbid:
  base_url: https://www.onbid.co.kr
  search_path: /op/cltrpbancinf/cltr/cltrcdtnsrch/CltrCdtnSrchController/mvmnCltrCdtnSrchClg.do
  list_path: /op/cltrpbancinf/cltr/cltrcdtnsrch/CltrCdtnSrchController/srchCltrCdtn.do
  detail_path: /op/cltrpbancinf/cltr/cltrdtl/CltrDtlController/mvmnCltrDtl.do
  page_unit: 30
  request_delay_sec: 1.5

form:
  srch_cltr_type: "0001"          # 부동산
  srch_dsps_mthod: "0001"         # 매각
  srch_bid_mthod: "0001"          # 전자입찰
  srch_bid_div_type: "0001"       # 일반경쟁
  # 지분여부 — 검색폼이 필터링 무시하므로 빈 값(전체) 처리, 지분 필터는 UI 탭 분류로 대체
  srch_shr_yn: ""
  srch_lowst_bid_end_prc: 300000000
  srch_bld_sqms_type: RANGE
  srch_min_bld_ldar: 23
  srch_sort_type: ASC
  srch_word_type: "0001"
  bid_period_days: 90
  # 유찰횟수 검색 단계 cap — 0~5 (모든 용도 유찰 5회 이하로 통일, 검색부터 좁힘)
  srch_usbd_nft_bgng: 0
  srch_usbd_nft_end: 5
  # 용도 코드 — 수집 시점에는 모두 포함 (주거 + 용도복합·오피스텔 + 토지)
  #   UI 탭(주거 / 용도복합·오피스텔 / 주거지분 / 도로)에서 분류
  srch_prpt_types:
    - "0007"
    - "0005"
    - "0001"
  # 지역: 서울특별시 전체
  srch_array_rgn:
    - "1100000000"

regions:
  # 지역 후처리 모드: seoul_all = 서울특별시 전체 통과 / songpa_gangnam = 송파·강남 화이트리스트 + 선릉 3km
  mode: seoul_all
  # 송파구 화이트리스트 (mode=songpa_gangnam에서만 사용)
  songpa_dongs:
    - 잠실본동
    - 삼전동
    - 석촌동
    - 송파1동
    - 방이2동
    - 방이동
    - 송파동
  # 선릉역 3km 이내 강남 동만 (자곡·개포·일원 등 남부 제외)
  gangnam_whitelist:
    - 삼성동
    - 대치동
    - 역삼동
    - 논현동
    - 청담동
    - 압구정동
    - 신사동
  seolleung:
    lat: 37.5045
    lng: 127.0489
    radius_km: 3.0
  transit_destination:
    address: "서울 강남구 선릉로 433"
    lat: 37.5045
    lng: 127.0489
  # 언니(쪠) 영역 — 영등포구 전체 + 서대문역 8km(대중교통 편도 30분 이내)
  # 오피스텔/용도복합 매물은 '나(쪈, 송파·강남)' 또는 '언니(쪠, 영등포)' 둘 중 하나에 속하면 통과
  sister_zone:
    gu: 영등포구
    transit:
      address: "서울 서대문구 서대문역"
      lat: 37.5659
      lng: 126.9668
      radius_km: 8.0
      max_minutes: 30

post_filters:
  max_transit_minutes: 30        # mode=songpa_gangnam 일 때만 의미
  max_fail_count: 5              # 모든 용도 유찰 5회 이하 (6회 이상 제외)
  max_min_price: 300000000       # 단독 건물 최저가 상한 (3억)
  max_min_price_share: 50000000  # 주거 지분 최저가 상한 (5천만 — 소액 지분 투자)
  max_min_price_land: 10000000   # 토지/도로 최저가 상한 (1천만 — 책: 도로/맹지 300~1000만)
  # 토지 세부 용도 화이트리스트 — 이 14종만 통과 (학교용지/종교용지/철도용지 등 제외)
  land_allowed_categories:
    - 대지 # 입문자 추천 ~
    - 전
    - 답
    - 임야
    - 잡종지
    - 창고용지
    - 주차장
    - 주택부지
    - 기타토지
    - 공장용지 # 조건부 추천 ~
    - 과수원
    - 목장용지
    - 초지
    - 도로
  min_bld_area_m2: 23            # 단독 건물면적 하한 (지분은 면제)
  exclude_land_only: true
  require_elevator: true
  # 주거용건물 세부 7종 화이트리스트 — 이 7종만 통과 (다가구/다중/연립/기타주거용 등 제외)
  #   오피스텔·용도복합·토지는 이 검사 우회 (별도 분류)
  allowed_categories:
    - 아파트
    - 주상복합
    - 단독주택
    - 도시형생활주택
    - 다세대주택
    - 빌라
    - 전원주택
  # 제목에 명시적 지분 표기가 있는 경우만 (예: '지분매각', '○○○ 지분')
  exclude_share_keywords:
    - 지분매각
    - 지분처분
    - 공유지분
    - 대지지분
  # 카테고리 부분 일치로 차단 (allowed_categories에 화이트리스트로 통과되더라도 우선 차단)
  exclude_categories:
    - 상가용및업무용건물
