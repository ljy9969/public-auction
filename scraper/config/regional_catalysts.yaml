# 지역 호재 화이트리스트 (수도권) — 지분 투자 추천 알림용.
#
# 출처: 경공매 실전 팁 + Claude 지식(2026-01 기준). 책 메모 핵심대로
#   ① 내 물건과 '직접 연관'되는 좁은 범위(읍·면·동/역세권)로 매칭하고
#   ② '실제 추진 중'인 대형·확정 호재만 보수적으로 등록한다.
#
# ⚠️ 운영자 검토·보강 필수: 지식 시점(2026-01) 이후 변경/취소/확장 가능.
#    토지이음·씨리얼·시청 홈페이지로 진행상황 확인 후 match 범위를 조정하세요.
#    새 호재는 아래 형식으로 추가하면 알림 매칭에 바로 반영됩니다.
#
# 매칭 규칙: 매물 주소(지번/도로명)에 match 문자열 중 하나라도 포함되면 호재 적중.
#   - 광역(시·군·구) 단위는 오탐이 크므로 가급적 읍·면·동까지 좁힐 것.
#   - confidence: high(국책·착공/개통) / medium(확정이나 일정 유동)

catalysts:
  # ===== 반도체·산업단지 (대형 국책, 직접 고용·인구 유입) =====
  - name: 평택 고덕국제신도시·삼성 평택캠퍼스
    type: 반도체·신도시
    match: ["평택시 고덕"]
    confidence: high
    note: 삼성전자 평택캠퍼스(P1~) + 고덕국제화계획지구

  - name: 용인 반도체 클러스터 (SK하이닉스)
    type: 반도체 국가산단
    match: ["용인시 처인구 원삼", "처인구 원삼면"]
    confidence: high
    note: 원삼면 SK하이닉스 용인 반도체 클러스터 일반산단

  - name: 용인 첨단시스템반도체 국가산단
    type: 반도체 국가산단
    match: ["용인시 처인구 이동", "용인시 처인구 남사"]
    confidence: high
    note: 이동·남사읍 시스템반도체 국가산업단지 (삼성)

  - name: 이천 SK하이닉스 (부발)
    type: 반도체
    match: ["이천시 부발읍"]
    confidence: high
    note: 부발읍 SK하이닉스 본사·M16 등

  # ===== 3기 신도시 (확정·지구지정) =====
  - name: 남양주 왕숙 신도시
    type: 3기 신도시
    match: ["남양주시 진접", "남양주시 진건", "남양주시 퇴계원"]
    confidence: high
    note: 왕숙1·2 공공주택지구

  - name: 하남 교산 신도시
    type: 3기 신도시
    match: ["하남시 천현동", "하남시 교산동", "하남시 춘궁동", "하남시 상사창동", "하남시 하사창동"]
    confidence: high

  - name: 인천 계양 테크노밸리
    type: 3기 신도시
    match: ["계양구 귤현동", "계양구 동양동", "계양구 박촌동", "계양구 병방동", "계양구 상야동"]
    confidence: high

  - name: 고양 창릉 신도시
    type: 3기 신도시
    match: ["덕양구 화전동", "덕양구 용두동", "덕양구 동산동", "덕양구 향동동", "덕양구 도내동"]
    confidence: high

  - name: 부천 대장 신도시
    type: 3기 신도시
    match: ["부천시 대장동", "부천시 오정동", "부천시 원종동", "부천시 삼정동"]
    confidence: high

  - name: 광명·시흥 신도시
    type: 3기 신도시
    match: ["광명시 광명동", "광명시 옥길동", "광명시 노온사동", "시흥시 과림동", "시흥시 무지내동", "시흥시 금이동"]
    confidence: high

  - name: 의왕·군포·안산 신도시
    type: 3기 신도시
    match: ["의왕시 초평동", "의왕시 월암동", "군포시 도마교동", "안산시 상록구 건건동"]
    confidence: medium

  # ===== GTX 역세권 (착공/부분개통 — 역 인근 동만) =====
  - name: GTX-A 운정역
    type: GTX-A
    match: ["파주시 동패동", "파주시 와동동", "파주시 목동동"]
    confidence: high
  - name: GTX-A 동탄역
    type: GTX-A
    match: ["화성시 오산동", "화성시 영천동", "화성시 청계동"]
    confidence: high
  - name: GTX-A 구성역
    type: GTX-A
    match: ["기흥구 마북동", "기흥구 보정동"]
    confidence: high
  - name: GTX-B 송도·인천대입구
    type: GTX-B
    match: ["연수구 송도동"]
    confidence: high
  - name: GTX-B 남양주 (별내·평내호평·마석)
    type: GTX-B
    match: ["남양주시 별내동", "남양주시 평내동", "남양주시 호평동", "남양주시 화도읍"]
    confidence: high
  - name: GTX-C 덕정역
    type: GTX-C
    match: ["양주시 덕정동", "양주시 회정동"]
    confidence: high
  - name: GTX-C 의정부역
    type: GTX-C
    match: ["의정부시 의정부동", "의정부시 가능동"]
    confidence: medium

  # ===== 철도 신설·연장 (착공/개통) =====
  - name: 서해선 안중역
    type: 철도(서해선)
    match: ["평택시 안중읍", "평택시 현덕면", "평택시 오성면"]
    confidence: high
    note: 서해선(신안산~홍성) 안중역 — 2024~ 개통 구간
  - name: 신안산선 (안산·시흥)
    type: 철도(신안산선)
    match: ["안산시 단원구 신길동", "시흥시 정왕동", "시흥시 목감동"]
    confidence: medium
  - name: 별내선(8호선 연장) 구리·남양주
    type: 철도(8호선)
    match: ["구리시 인창동", "구리시 토평동", "남양주시 다산동"]
    confidence: high
  - name: 7호선 연장 (양주 옥정·포천)
    type: 철도(7호선)
    match: ["양주시 옥정동", "양주시 회천동", "포천시 송우리", "포천시 자작동"]
    confidence: medium
  - name: 신분당선 연장 (광교~호매실)
    type: 철도(신분당선)
    match: ["수원시 권선구 호매실동", "수원시 권선구 금곡동"]
    confidence: medium

  # ===== 기타 개발지구 =====
  - name: 시흥 배곧신도시 (서울대 시흥캠퍼스)
    type: 개발지구
    match: ["시흥시 배곧동", "시흥시 정왕동"]
    confidence: medium
