# 지역 호재 화이트리스트 (수도권) — 지분 투자 추천 알림용.
#
# 검증·갱신: 2026-06-07 (최종 병합본).
#   · 웹 검색·뉴스·정부/공공 자료로 교차 검증한 버전 +
#   · ChatGPT/Gemini 갱신본(regional_catalysts_updated_2026-06)을
#   중복 없이 최신 기준으로 병합. (동탄역+동탄테크노밸리 등 match 동일 항목 통합)
#
# ⚠️ 개별 물건의 '직접 연관성·추진 여부'는 운영자가 토지이음(eum.go.kr)·
#    씨:리얼(seereal.lh.or.kr)·시청 홈페이지로 필지 단위 재확인할 것.
#    (이 목록은 광역 호재 1차 스크리닝용 — 최종 판단은 직접.)
#
# 매칭 규칙: 매물 주소(지번/도로명)에 match 문자열 중 하나라도 포함되면 적중.
#   - 가급적 읍·면·동/역세권까지 좁혀 '직접 연관'만. 광역(시·군) 단위는 지양.
#   - confidence: high(개통·착공/투자 진행) / medium(확정·일정 지연/원거리) / low(초기 절차·장기화)

catalysts:
  # ===== 반도체·산업단지 (국책, 직접 고용·인구 유입) =====
  - name: 평택 고덕국제신도시·삼성 평택캠퍼스
    type: 반도체·신도시
    match: ["평택시 고덕"]
    confidence: high
    note: 삼성 평택캠퍼스 가동(HBM 확장 2026) + 고덕국제신도시 입주 진행

  - name: 평택 브레인시티 산업단지
    type: 산업단지
    match: ["평택시 도일동"]
    confidence: medium
    note: 자족형 복합산단(146만평) 조성·분양 중, 2028 완공 예정 (도일동 일대)

  - name: 평택항 미래산업벨트 (포승·현덕)
    type: 산업물류
    match: ["평택시 포승읍", "평택시 현덕면"]
    confidence: medium
    note: 평택항 포승지구·현덕지구 — 물류·친환경 모빌리티 산업단지 연계 (추진상황 변동 큼, 확인 필수)

  - name: 용인 반도체 클러스터 (SK하이닉스)
    type: 반도체 국가산단
    match: ["용인시 처인구 원삼면", "처인구 원삼면", "원삼면 죽능리", "원삼면 독성리", "원삼면 고당리", "원삼면 맹리"]
    confidence: high
    note: 원삼면 SK 1기 팹 착공·투자 진행(2026-03~ 투자, 8월 2단계 착공). 순차 팹·인프라 확장

  - name: 용인 첨단시스템반도체 국가산단 (삼성)
    type: 반도체 국가산단
    match: ["용인시 처인구 이동", "용인시 처인구 남사"]
    confidence: high
    note: 이동·남사읍 시스템반도체 국가산단 추진(보상·부지조성 단계, 배후지 개발 연계)

  - name: 이천 SK하이닉스 (부발)
    type: 반도체
    match: ["이천시 부발읍"]
    confidence: high
    note: 부발읍 SK하이닉스 본사·생산캠퍼스 (가동 중)

  - name: 안성 반도체 배후단지
    type: 반도체 배후
    match: ["안성시 원곡면", "안성시 양성면"]
    confidence: medium
    note: 용인 반도체 클러스터 인접 배후 — 물류·협력업체 단지 전개 수혜

  # ===== 3기 신도시 & 주요 택지지구 (지구 확정·착공, 일부 입주 지연) =====
  - name: 인천 계양 테크노밸리
    type: 3기 신도시
    match: ["계양구 귤현동", "계양구 동양동", "계양구 박촌동", "계양구 병방동", "계양구 상야동"]
    confidence: high
    note: 3기 최초 본청약, 2026-12 첫 입주 예정 (진행 최속)

  - name: 부천 대장 신도시
    type: 3기 신도시
    match: ["부천시 대장동", "부천시 오정동", "부천시 원종동", "부천시 삼정동"]
    confidence: high
    note: 착공 진행 + 대장~홍대선 광역철도 착공(2031 개통 목표)

  - name: 남양주 왕숙 신도시
    type: 3기 신도시
    match: ["남양주시 진접", "남양주시 진건", "남양주시 퇴계원"]
    confidence: high
    note: 왕숙1·2 착공 진행 (입주 2028-03 이후로 지연)

  - name: 하남 교산 신도시
    type: 3기 신도시
    match: ["하남시 천현동", "하남시 교산동", "하남시 춘궁동", "하남시 상사창동", "하남시 하사창동"]
    confidence: high
    note: 본단지 착공 진행 (입주 2029 전후 지연)

  - name: 고양 창릉 신도시
    type: 3기 신도시
    match: ["덕양구 화전동", "덕양구 용두동", "덕양구 동산동", "덕양구 향동동", "덕양구 도내동"]
    confidence: high
    note: 착공 진행 (입주 2028-05 전후 연기)

  - name: 광명·시흥 신도시
    type: 3기 신도시(추가택지)
    match: ["광명시 광명동", "광명시 옥길동", "광명시 노온사동", "시흥시 과림동", "시흥시 무지내동", "시흥시 금이동"]
    confidence: medium
    note: 최대 규모 추가택지, 지구계획 승인 후 보상·부지조성 단계(착공 전)

  - name: 의왕·군포·안산 신도시
    type: 3기 신도시(추가택지)
    match: ["의왕시 초평동", "의왕시 월암동", "군포시 도마교동", "안산시 상록구 건건동"]
    confidence: low
    note: 추가택지, 지구계획·초기 절차 단계로 장기화 가능성

  - name: 오산 세교3 공공주택지구
    type: 공공택지
    match: ["오산시 벌음동", "오산시 탑동"]
    confidence: medium
    note: 세교1·2 연계 반도체 배후 주거단지용 공공주택지구 추진

  - name: 인천 검단신도시
    type: 신도시
    match: ["서구 당하동", "서구 원당동", "서구 마전동", "서구 불로동", "서구 오류동", "서구 왕길동"]
    confidence: high
    note: 대규모 입주 진행(2026 집중) + 인천1호선 연장 신검단중앙역 연계

  # ===== GTX (역세권 동만 — 직접 연관) =====
  - name: GTX-A 운정중앙역
    type: GTX-A
    match: ["파주시 동패동", "파주시 와동동", "파주시 목동동"]
    confidence: high
    note: 운정~동탄 전구간 2026-06-27 개통 예정(삼성역 무정차 직결)

  - name: GTX-A 동탄역·동탄테크노밸리
    type: GTX-A·첨단산업
    match: ["화성시 오산동", "화성시 영천동", "화성시 청계동"]
    confidence: high
    note: 수서~동탄 운영 중, 2026-06 전구간 직결 예정 + 동탄테크노밸리 업무·산업 클러스터

  - name: GTX-A 구성역
    type: GTX-A
    match: ["기흥구 보정동", "기흥구 마북동"]
    confidence: high
    note: 기개통 운행 중 + 용인 플랫폼시티 개발 연계

  - name: GTX-B 송도·인천대입구
    type: GTX-B
    match: ["연수구 송도동"]
    confidence: medium
    note: 재정구간 공사 중이나 민자구간 PF 이슈로 진척 지연

  - name: GTX-B 남양주 (평내호평·마석)
    type: GTX-B
    match: ["남양주시 평내동", "남양주시 호평동", "남양주시 화도읍"]
    confidence: medium
    note: 구간별 착공 단계, 전구간 개통 2028 이후 전망 (별내동은 별내선 항목에서 매칭)

  - name: GTX-C 덕정역
    type: GTX-C
    match: ["양주시 덕정동", "양주시 회정동"]
    confidence: medium
    note: 착공 절차 진행, 2028 이후 개통 목표(일정 유동)

  - name: GTX-C 의정부역
    type: GTX-C
    match: ["의정부시 의정부동", "의정부시 가능동"]
    confidence: medium
    note: 착공 추진 + 의정부역 역세권 고밀 복합개발 연계

  # ===== 철도 신설·연장 =====
  - name: 서해선 안중역 (KTX-이음)
    type: 철도(서해선)
    match: ["평택시 안중읍"]
    confidence: high
    note: 서해선 2024-11 개통(운행 중), 2026-03 서울방향 KTX-이음 운행. 경부고속 직결 시 서울 30분대(2031~)

  - name: 별내선 (8호선 연장)
    type: 철도(8호선)
    match: ["남양주시 별내동", "남양주시 다산동", "구리시 인창동", "구리시 토평동"]
    confidence: high
    note: 2024-08-10 개통(운영 중), 잠실 20분대

  - name: 신안산선 (안산·시흥)
    type: 철도(신안산선)
    match: ["안산시 단원구 신길동", "시흥시 목감동", "시흥시 장현동"]
    confidence: medium
    note: 현장 이슈·지연 누적, 개통 2027~2028 전망

  - name: 7호선 도봉산-옥정 연장 (양주)
    type: 철도(7호선)
    match: ["양주시 옥정동", "양주시 회천동"]
    confidence: medium
    note: 착공, 개통 2027~2028 목표(지연 가능)

  - name: 7호선 옥정-포천 연장
    type: 철도(7호선)
    match: ["포천시 송우리", "포천시 자작동"]
    confidence: medium
    note: 2025 착공, 2030년대 개통 목표 (초기 공사 단계)

  - name: 신분당선 연장 (광교~호매실)
    type: 철도(신분당선)
    match: ["수원시 권선구 호매실동", "수원시 권선구 금곡동"]
    confidence: medium
    note: 2024-07 착공, 2029~2030 완공·개통 목표

  # ===== 기타 개발지구 =====
  - name: 시흥 배곧신도시 (서울대 시흥캠퍼스)
    type: 개발지구
    match: ["시흥시 배곧동"]
    confidence: medium
    note: 신도시 성숙기, 바이오 특화단지 공모 + 서울대 캠퍼스 확충 추진
